agents:
    url: agents
auth:
    cookieName: agently_session
    defaultUsername: devuser
    enabled: true
    ipHashKey: dev-hmac-salt
    local:
        enabled: true
default:
    agent: chatter
    agentAutoSelection:
        model: openai_gpt-5-mini
    appIconRef: builtin:viant
    appName: Agently
    embedder: openai_text
    model: openai_gpt-5.4
    resources:
        indexPath: ${runtimeRoot}/index/data
        snapshotPath: ${runtimeRoot}/snapshots
    runtimeRoot: ~/agently/runtime
    statePath: ${runtimeRoot}/state
    summaryModel: openai_gpt-5-mini
    toolAutoSelection:
        model: openai_gpt-5-mini
embedders:
    url: embedders
internalMCP:
    services:
        - system/exec
        - system/os
        - system/goal
        - system/patch
        - orchestration/plan
        - llm/agents
        - resources
        - message
        - template
models:
    url: models
