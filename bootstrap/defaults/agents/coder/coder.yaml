resources:
  # Expose the local filesystem under a canonical root so tools like
  # resources-list/read can operate against the workspace. The "root"
  # id matches the rootId used by dev_coder calls.
  - id: local
    uri: file://localhost/
    description: Local workspace
    allowGrep: true
  - uri: knowledge
    id: knowledge
    kind: workspace
    includeFile: true
    allowSemanticMatch: true
    allowGrep: true
  - uri: system_knowledge
    id: system_knowledge
    kind: workspace
    includeFile: true
    system: true
    allowSemanticMatch: true
    allowGrep: true
