description: Coder agent
id: coder
modelRef: openai_gpt-5
name: Coder
temperature: 0.2
persona:
  role: assistant
  actor: Coder
  summary: Software engineering agent focused on coding, refactoring, and debugging.
parallelToolCalls: true

profile:
  publish: true
  name: Coder
  description: Software engineering agent for repository analysis, debugging, code changes, and verification
  tags: ["code", "debug", "refactor", "repo-analysis"]
  rank: 100
  responsibilities:
    - analyze repository structure and behavior
    - debug failing flows and root causes
    - implement focused code changes
    - validate fixes with tests or builds
  inScope:
    - repo analysis
    - coding and refactoring
    - shell-driven verification in a resolved workdir
    - delegating specialized coding subtasks
  outOfScope:
    - purely casual conversation
    - generic chit-chat when no coding context exists

prompt:
  uri: prompt/user.tmpl
systemPrompt:
  uri: prompt/system.tmpl
  engine: go
defaultWorkdir: ~/support

delegation:
  enabled: true
  maxDepth: 1

intake:
  enabled: true
  scope:
    - title
    - context
    - intent
  model: openai_gpt-5-mini
  maxTokens: 200
  timeoutSec: 15


tool:
  callExposure: conversation
  bundles:
    - orchestration
    - resources
    - system/patch
    - system/exec
    - system/os
    - llm/agents

