id: explorer
match:
  service: resources
  method: "*"

activation:
  kind: history
  scope: all

dataSource:
  ops:
    source: ops
  search:
    source: input
  results:
    source: output.files
    paging:
      enabled: true
      size: 3
    uniqueKey:
      - field: URI
      - field: SearchHash
      - field: RangeKey

ui:
  title: Explorer
  containers:
    - id: searchBar
      dataSourceRef: search
      style:
        background: '#fbfefc'
        border: 1px solid #d8e8dd
        borderRadius: 10px
        padding: 8px 10px
      items:
        - id: pattern
          type: text
          wrapper: none
          properties:
            placeholder: Search in selected file or folder…
            leftIcon: search
            fill: true

    - id: results
      type: table
      title: Results
      dataSourceRef: results
      table:
        on:
          - event: onRowSelect
            handler: dataSource.toggleSelection
          - event: onRowSelect
            handler: chat.explorerOpen
        pagination: {}
        columns:
          - id: Path
            name: File
            width: 220
          - id: Matches
            name: Hits
            width: 40
          - id: open
            name: ' '
            type: icon
            width: 10
            on:
              - event: onValue
                handler: chat.explorerOpenIcon
              - event: onClick
                handler: chat.explorerOpen
      style:
        marginTop: 8px
        height: min(20vh, 220px)
        overflow: hidden
        background: '#ffffff'
        border: 1px solid #dbe7df
        borderRadius: 10px
        padding: 6px 8px
