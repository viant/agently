id: changes
match:
  service: system/patch
  method: apply
activation:
  kind: tool_call
  service: system/patch
  method: snapshot


dataSource:
  snapshot:
    source: output

  changes:
    dataSourceRef: snapshot
    uniqueKey:
      - field: changes
    selectors:
      data: changes


ui:
  title: Changes
  containers:
    - id: changes
      dataSourceRef: changes
      fileBrowser:
        title: Browser
        className: app-feed-browser app-feed-browser-changes
        style:
          height: min(18vh, 180px)
          background: '#fffdfa'
          border: 1px solid #ead9cb
          borderRadius: 10px
          padding: 6px 8px
        on:
          - event: onFileSelect
            handler: chat.onChangedFileSelect
          - event: onPrepareTreeData
            handler: chat.prepareChangeFiles
    - id: toolbar
      dataSourceRef: snapshot
      style:
        marginTop: 8px
        background: '#fff'
        border: 1px solid #eadfd4
        borderRadius: 10px
        padding: 6px 8px
      toolbar:
        className: app-feed-toolbar app-feed-toolbar-changes
        items:
          - id: revert
            label: Revert
            icon: undo
            align: right
            on:
              - event: onClick
                handler: chat.runPatchRollback

          - id: apply
            label: Apply
            icon: confirm
            align: right
            on:
              - event: onClick
                handler: chat.runPatchCommit
