init:
  repoPath: $WorkingDirectory(../..)

pipeline:
  buildUI:
    action: exec:run
    TimeoutMs: 120000
    description: build and embed UI (optional - uses pre-built if fails)
    commands:
      - cd $repoPath
      - ./scripts/build-ui-embed.sh || echo "[build-ui-embed] skipped - using pre-built UI assets"

  buildAgently:
    action: exec:run
    TimeoutMs: 180000
    description: build agently binary
    checkError: true
    commands:
      - cd $repoPath
      - export PATH=/usr/local/go/bin:$PATH
      - export GOPATH=${env.GOPATH}
      - mkdir -p $repoPath/bin
      - go build -o $repoPath/bin/agently ./agently
      - cp $repoPath/bin/agently $repoPath/agently/agently
