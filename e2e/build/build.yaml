

pipeline:

  buildUI:
    action: exec:run
    TimeoutMs: 120000
    commands:
    - cd $repoPath
    - ./scripts/build-ui-embed.sh current
    - ./scripts/build-ui-embed.sh v1

  build:
    action: exec:run
    TimeoutMs: 120000
    checkError: true
    commands:
      - cd $repoPath
      - export PATH=/usr/local/go/bin:$PATH
      - export GOPATH=${env.GOPATH}
      - export GOROOT=/usr/local/go
      - mkdir -p $repoPath/bin
      - cd ${repoPath}
      - ./scripts/build-ui-embed.sh current
      - ./scripts/build-ui-embed.sh v1
      - cd ${repoPath}/datly
      - go mod tidy
      - /usr/local/go/bin/go build -o $repoPath/bin/datly
      # Build agently last so embedded UI reflects latest deployment/ui and deployment/ui/v1.
      # Keep both binary locations:
      # - $repoPath/bin/agently for direct/manual usage
      # - $repoPath/agently/agently for the existing Endly app runner
      - cd ${repoPath}
      - /usr/local/go/bin/go build -o $repoPath/bin/agently ./agently
      - cp $repoPath/bin/agently $repoPath/agently/agently
      - test -x $repoPath/bin/agently
