init:
  mysqlCred: mysql-e2e.json
  mysqlSecrets: ${secrets.$mysqlCred}
  repoPath: $WorkingDirectory(./..)
  serverPort: '$serverPort ? $serverPort : 9091'
  serverURL: http://127.0.0.1:${serverPort}
  workspacePath: '${env.AGENTLY_WORKSPACE ? env.AGENTLY_WORKSPACE : ${repoPath}/.agently}'
  dbIP:
    mysql: localhost
    user: ${mysqlSecrets.Username}
    password: ${mysqlSecrets.Password}
  dbPort:
    mysql: 3307
  connections: -c='agently|mysql|${dbIP.user}:${dbIP.password}@tcp(${dbIP.mysql}:${dbPort.mysql})/agently?parseTime=true'
  datlyOptions: $connections

pipeline:

  init:
    system:
      action: run
      description: init system (docker mysql)
      request: '@system'

    database:
      action: run
      description: init database schema
      request: '@database/database'

  build:
    action: run
    description: build agently binary
    request: '@build/build'

  app:
    start:
      action: exec:run
      description: start agently server
      checkError: true
      commands:
        - |
          pids=$(lsof -tiTCP:${serverPort} -sTCP:LISTEN || true)
          if [ -n "$pids" ]; then
            kill $pids || true
          fi
          for i in $(seq 1 20); do
            if ! lsof -nP -iTCP:${serverPort} -sTCP:LISTEN | grep -q LISTEN; then
              break
            fi
            sleep 0.5
          done
        - |
          (nohup env AGENTLY_WORKSPACE=${workspacePath} \
            AGENTLY_DB_DRIVER=mysql \
            AGENTLY_DB_DSN="${dbIP.user}:${dbIP.password}@tcp(${dbIP.mysql}:${dbPort.mysql})/agently?parseTime=true" \
            ${repoPath}/bin/agently serve -a :${serverPort} >/tmp/agently-e2e.log 2>&1 &)
        - |
          for i in $(seq 1 40); do
            if curl -fsS ${serverURL}/healthz | grep -q '"status":"ok"'; then
              exit 0
            fi
            sleep 0.5
          done
          echo "server failed to start on ${serverURL}/healthz"
          tail -n 80 /tmp/agently-e2e.log || true
          exit 1

  health:
    action: http/runner:send
    description: verify server health endpoint
    requests:
      - Method: GET
        URL: ${serverURL}/healthz
        Expect:
          Code: 200
          JSONBody:
            status: ok

  test:
    action: run
    description: run e2e regression tests
    request: '@regression/regression'
    params:
      serverURL: $serverURL

  cleanup:
    stop:
      action: exec:run
      description: stop agently server
      commands:
        - |
          pids=$(lsof -tiTCP:${serverPort} -sTCP:LISTEN || true)
          if [ -n "$pids" ]; then
            kill $pids || true
          fi
