pipeline:
  simpleHi:
    action: webdriver:run
    description: send hi in the browser and wait for the final chatter response
    Browser: chrome
    SessionID: localhost:${webdriverPort}
    navigation:
      TimeoutMs: 30000
    commands:
      - get(${appURL})
      - (xpath://button[contains(.,'New Conversation')]).click
      - (xpath://*[@data-testid='chat-composer-input']).clear
      - (xpath://*[@data-testid='chat-composer-input']).sendKeys(hi)
      - (xpath://*[@data-testid='chat-composer-send']).click
      - command: execution = (xpath://body).text
        exit: $execution.Text:/Execution details/
        waitTimeMs: 90000
        repeat: 90
      - command: body = (xpath://body).text
        exit: $body.Text:/Hi! How can I help you today\\?/
        waitTimeMs: 90000
        repeat: 90
      - close
    expect:
      body:
        Text: /Hi! How can I help you today\?/
