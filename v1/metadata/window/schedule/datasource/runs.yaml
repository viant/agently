service:
  endpoint: agentlyAPI
  uri: /v1/api/agently/scheduler/run
  method: GET

paging:
  size: 25
  enabled: true
  dataInfoSelectors:
    pageCount: pageCount
    totalCount: totalCount

parameters:
  - from: schedules:selection
    to: :query
    name: scheduleId
    kind: query
    location: id
  - from: const
    to: :query
    name: requireScheduleId
    kind: query
    location: "true"

selectors:
  data: data.runs
  dataInfo: data

on:
  - event: onFetch
    handler: schedule.onFetchRuns

filterSet:
  - name: default
    default: true
    template:
      - id: status
        label: Filter by status...
        operator: eq

quickFilterSet: default

uniqueKey:
  - field: id
