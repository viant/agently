service:
  endpoint: agentlyAPI
  uri: /v1/api/agently/scheduler/run/{id}
  method: GET

paging:
  size: 10
  enabled: true
  dataInfoSelectors:
    pageCount: pageCount
    totalCount: totalCount

parameters:
  - from: schedules:form
    to: :path
    name: id
    kind: path
    location: id

selectors:
  data: data
  dataInfo: info

on:
  - event: onFetch
    handler: schedule.onFetchRuns

filterSet:
  - name: default
    default: true
    template:
      - id: status
        label: Filter by status...
        operator: eq

quickFilterSet: default

uniqueKey:
  - field: id
