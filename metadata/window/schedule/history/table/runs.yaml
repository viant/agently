columns:
  - id: status
    name: Status
    sortable: true
    width: 96
    enforceColumnSize: true
    tooltip: Execution outcome
    on:
      - event: onValue
        handler: schedule.formatStatus
  - id: createdAt
    name: Requested
    sortable: true
    width: 120
    enforceColumnSize: true
    tooltip: When the run was queued
    on:
      - event: onValue
        handler: schedule.formatDate
  - id: startedAt
    name: Started
    sortable: true
    width: 120
    enforceColumnSize: true
    tooltip: When execution began
    on:
      - event: onValue
        handler: schedule.formatDate
  - id: completedAt
    name: Finished
    sortable: true
    width: 120
    enforceColumnSize: true
    tooltip: When execution completed
    on:
      - event: onValue
        handler: schedule.formatDate
  - id: duration
    name: Duration
    sortable: false
    width: 90
    enforceColumnSize: true
    tooltip: Total execution time
    on:
      - event: onValue
        handler: schedule.formatDuration
  - id: conversationId
    name: Conversation
    sortable: false
    width: 190
    enforceColumnSize: true
    tooltip: Linked conversation ID
  - id: errorMessage
    name: Error
    sortable: false
    width: 220
    enforceColumnSize: true
    tooltip: Error details or status message
  - id: openChat
    icon: chat
    type: button
    width: 32
    tooltip: Open conversation
    on:
      - event: onClick
        handler: window.openWindow
        args:
          - chat/new
          - Run Chat
        parameters:
          - name: parameters.id
            to: conversations:input
            from: :form
            location: conversationId
          - name: parameters.convID
            to: messages:input
            from: :form
            location: conversationId

toolbar:
  items:
    - id: refresh
      icon: refresh
      align: left
      tooltip: Refresh run history
    - id: pagination
      type: pagination
      align: center
    - id: quickFilter
      placeholder: Filter by status...
      align: right

pagination: {}
