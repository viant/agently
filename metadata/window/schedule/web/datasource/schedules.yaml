service:
  endpoint: agentlyAPI
  uri: /v1/api/agently/scheduler/
  method: GET

paging:
  size: 25
  enabled: true
  dataInfoSelectors:
    pageCount: pageCount
    totalCount: totalCount

selectors:
  data: data.schedules
  dataInfo: ''

on:
  - event: onFetch
    handler: schedule.onFetchSchedules
  - event: onSelection
    handler: schedule.onSelectSchedule

filterSet:
  - name: default
    default: true
    template:
      - id: name
        label: Filter schedules...
        operator: eq

quickFilterSet: default

uniqueKey:
  - field: id

selectionMode: single
retainSelectionOnRepeatClick: true
