columns:
  - id: name
    name: Schedule Name
    sortable: true
    width: 180
    enforceColumnSize: true
    tooltip: Friendly name for this automation
  - id: agentRef
    name: Agent
    sortable: true
    width: 120
    enforceColumnSize: true
    tooltip: The agent that runs on this schedule
  - id: scheduleType
    name: Type
    sortable: true
    width: 80
    enforceColumnSize: true
    tooltip: Cron, interval, or custom schedule
    on:
      - event: onValue
        handler: schedule.formatScheduleType
  - id: enabled
    name: Active
    width: 60
    type: checkbox
    sortable: true
    enforceColumnSize: true
    tooltip: Whether this schedule is currently active
  - id: cronExpr
    name: Schedule
    sortable: true
    width: 160
    enforceColumnSize: true
    tooltip: When this schedule fires
    on:
      - event: onValue
        handler: schedule.formatCronSummary
  - id: nextRunAt
    name: Next Run
    sortable: true
    width: 120
    enforceColumnSize: true
    tooltip: When the next execution is expected
    on:
      - event: onValue
        handler: schedule.formatDate
  - id: lastStatus
    name: Last Status
    sortable: true
    width: 100
    enforceColumnSize: true
    tooltip: Outcome of the most recent run
    on:
      - event: onValue
        handler: schedule.formatStatus
  - id: lastRunAt
    name: Last Run
    sortable: true
    width: 120
    enforceColumnSize: true
    tooltip: When the schedule last executed
    on:
      - event: onValue
        handler: schedule.formatDate

toolbar: $import('toolbar/schedules.yaml')

pagination: {}
