service:
  endpoint: agentlyAPI
  uri: /v1/conversations/{convID}/transcript
  method: GET

parameters:
  - name: convID
    kind: path
    in: form
    location: conversations.id

selectors:
  data: data.conversation.turns

uniqueKey:
  - field: id

on:
  - event: onSuccess
    handler: chat.hydrateMessagesCollection
  - event: onSuccess
    handler: chat.debugMessagesLoaded
  - event: onError
    handler: chat.debugMessagesError
