namespace: ChatConversations

dialogs:
  - $import('../new/dialog/settings.yaml')
  - $import('../new/dialog/fileBrowser.yaml')
  - $import('../new/dialog/queue.yaml')
  - $import('../new/dialog/approval_editor.yaml')

view:
  content:
    containers:
      - id: metaLoader
        dataSourceRef: meta
        fetchData: true

      - id: convTable
        title: Conversations
        dataSourceRef: conversations
        table: $import('table/conversations.yaml')
      - id: conversationSection
        chat:
          dataSourceRef: messages
          showSettings: false
          showTools: false
          showMic: true
          commandCenter: true
          abortVisible:
            dataSourceRef: conversations
            selector: running
          showUpload: true
          upload:
            endpoint: agentlyAPI
            path: upload
          uploadField: attachments
          on:
            - event: onSubmit
              handler: chat.submitMessage
              parameters:
                - name: model
                  in: form
                  location: conversations.model
                - name: agent
                  in: form
                  location: conversations.agent
            - event: onModelSelect
              handler: chat.selectModel
            - event: onAgentSelect
              handler: chat.selectAgent
            - event: onSettings
              handler: chat.onSettings
            - event: onUploadPrepare
              handler: chat.prepareUpload
            - event: onAbort
              handler: chat.abortConversation

dataSource:
  conversations: $import('datasource/conversations.yaml')
  messages: $import('datasource/messages.yaml')
  meta: $import('../new/datasource/meta.yaml')
  settings: $import('../new/datasource/settings.yaml')
  usage: $import('../new/datasource/usage.yaml')
  fs: $import('../../filebrowser/datasource/fileBrowser.yaml')
  queueTurns: $import('../new/dialog/datasource/queueTurns.yaml')
  approvalEditor: $import('../new/datasource/approval_editor.yaml')
