service:
  endpoint: agentlyAPI
  uri: /v1/conversations/{convID}/transcript
  method: GET

parameters:
  - name: convID
    kind: path
    in: input
    location: convID
  - name: includeModelCalls
    kind: query
    in: input
    location: includeModelCalls
  - name: includeToolCalls
    kind: query
    in: input
    location: includeToolCalls
  - name: since
    kind: query
    in: input
    location: since

params:
  includeModelCalls: "true"
  includeToolCalls: "true"
  since: ""

selectors:
  data: data.conversation.turns

uniqueKey:
  - field: id

on:
  - event: onFetch
    handler: chat.onFetchMessages
  - event: onError
    handler: chat.debugMessagesError
